<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discounts – MicroBizMax</title>
    <meta name="description" content="Create and manage discount offers">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="page-bg"></div>
<div class="app-layout">

    <nav class="sidebar">
        <div class="sidebar-brand">MicroBizMax</div>
        <ul class="sidebar-nav">
            <li><a href="/dashboard.html"><span class="nav-icon"></span><span>Dashboard</span></a></li>
            <li><a href="/products.html"><span class="nav-icon"></span><span>Products</span></a></li>
            <li><a href="/sales.html"><span class="nav-icon"></span><span>Sales</span></a></li>
            <li><a href="/customers.html"><span class="nav-icon"></span><span>Customers</span></a></li>
            <li><a href="/discounts.html" class="active"><span class="nav-icon"></span><span>Discounts</span></a></li>
            <li><a href="/profile.html"><span class="nav-icon"></span><span>Profile</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="#" id="logoutBtn"><span class="nav-icon"></span><span>Logout</span></a>
        </div>
    </nav>

    <main class="main-content">
        <div class="top-bar">
            <h1> Discounts & Offers</h1>
            <div class="top-bar-right">
                <select class="lang-selector" id="langSelector">
                    <option value="en">English</option><option value="hi">हिन्दी</option><option value="pa">ਪੰਜਾਬੀ</option>
                </select>
                <button class="btn btn-primary" id="addDiscountBtn">+ Create Discount</button>
            </div>
        </div>

        <div class="data-table-wrap">
            <table class="data-table" id="discountsTable">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Description</th>
                        <th>Type</th>
                        <th>Value</th>
                        <th>Min Order (₹)</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="discountsBody"></tbody>
            </table>
        </div>
        <div class="empty-state" id="emptyDiscounts" style="display:none;">
            <div class="empty-icon"></div>
            <p>No discounts yet. Create your first offer!</p>
        </div>
    </main>
</div>

<!-- Add/Edit Discount Modal -->
<div class="modal-overlay" id="discountModal">
    <div class="modal" style="position:relative;">
        <button class="modal-close" id="closeDiscountModal">&times;</button>
        <h2 id="discountModalTitle">Create Discount</h2>
        <form id="discountForm">
            <input type="hidden" id="editDiscountId">
            <div class="form-row">
                <div class="form-group">
                    <label>Discount Code</label>
                    <input class="form-control" id="dCode" placeholder="e.g. SAVE10" style="text-transform:uppercase;" required>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select class="form-control" id="dType">
                        <option value="PERCENTAGE">Percentage (%)</option>
                        <option value="FLAT">Flat (₹)</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Value</label>
                    <input class="form-control" type="number" step="0.01" id="dValue" placeholder="10" required>
                </div>
                <div class="form-group">
                    <label>Min Order Amount (₹)</label>
                    <input class="form-control" type="number" step="0.01" id="dMinOrder" placeholder="0">
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <input class="form-control" id="dDesc" placeholder="e.g. 10% off on orders above ₹200">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">Save Discount</button>
        </form>
    </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/translations.js"></script>
<script src="/js/discounts.js"></script>
<script src="/js/chatbot.js"></script>
</body>
</html>

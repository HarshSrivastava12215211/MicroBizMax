<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales – MicroBizMax</title>
    <meta name="description" content="Create and manage sales orders">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="page-bg"></div>
<div class="app-layout">

    <nav class="sidebar">
        <div class="sidebar-brand">MicroBizMax</div>
        <ul class="sidebar-nav">
            <li><a href="/dashboard.html"><span class="nav-icon"></span><span>Dashboard</span></a></li>
            <li><a href="/products.html"><span class="nav-icon"></span><span>Products</span></a></li>
            <li><a href="/sales.html" class="active"><span class="nav-icon"></span><span>Sales</span></a></li>
            <li><a href="/customers.html"><span class="nav-icon"></span><span>Customers</span></a></li>
            <li><a href="/discounts.html"><span class="nav-icon"></span><span>Discounts</span></a></li>
            <li><a href="/profile.html"><span class="nav-icon"></span><span>Profile</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="#" id="logoutBtn"><span class="nav-icon"></span><span>Logout</span></a>
        </div>
    </nav>

    <main class="main-content">
        <div class="top-bar">
            <h1> Sales</h1>
            <div class="top-bar-right">
                <select class="lang-selector" id="langSelector">
                    <option value="en">English</option><option value="hi">हिन्दी</option><option value="pa">ਪੰਜਾਬੀ</option>
                </select>
                <button class="btn btn-primary" id="newSaleBtn">+ New Sale</button>
            </div>
        </div>

        <!-- Order History -->
        <div class="data-table-wrap mb-32">
            <table class="data-table" id="ordersTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Date</th>
                        <th>Customer</th>
                        <th>Items</th>
                        <th>Amount (₹)</th>
                        <th>Discount</th>
                        <th>Profit (₹)</th>
                        <th>Payment</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="ordersBody"></tbody>
            </table>
        </div>
        <div class="empty-state" id="emptyOrders" style="display:none;">
            <div class="empty-icon"></div>
            <p>No sales yet. Click "New Sale" to record your first sale!</p>
        </div>
    </main>
</div>

<!-- New Sale Modal -->
<div class="modal-overlay" id="saleModal">
    <div class="modal" style="position:relative;max-width:640px;">
        <button class="modal-close" id="closeSaleModal">&times;</button>
        <h2>New Sale</h2>
        <form id="saleForm">
            <div class="form-row">
                <div class="form-group">
                    <label>Customer</label>
                    <select class="form-control" id="sCustomer">
                        <option value="">Walk-in Customer</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select class="form-control" id="sPayment">
                        <option value="CASH">Cash</option>
                        <option value="UPI">UPI</option>
                        <option value="CARD">Card</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Discount Code</label>
                <input class="form-control" id="sDiscountCode" placeholder="Enter discount code (optional)">
            </div>

            <!-- Items -->
            <div style="margin-bottom:16px;">
                <div class="flex-between mb-8">
                    <label style="font-size:.82rem;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:.5px;">Order Items</label>
                    <button type="button" class="btn btn-outline btn-sm" id="addItemRow">+ Add Item</button>
                </div>
                <div id="saleItemsContainer">
                    <!-- Dynamic rows appended here -->
                </div>
            </div>

            <div class="glass-card" style="padding:16px;margin-bottom:16px;">
                <div class="flex-between">
                    <span style="color:rgba(255,255,255,0.6);">Estimated Total:</span>
                    <span style="font-size:1.3rem;font-weight:700;" id="saleTotal">₹0</span>
                </div>
            </div>

            <button type="submit" class="btn btn-success" style="width:100%;justify-content:center;">Complete Sale</button>
        </form>
    </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/translations.js"></script>
<script src="/js/sales.js"></script>
<script src="/js/chatbot.js"></script>
</body>
</html>

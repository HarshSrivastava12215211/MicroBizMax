<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers – MicroBizMax</title>
    <meta name="description" content="Manage and track your customers">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="page-bg"></div>
<div class="app-layout">

    <nav class="sidebar">
        <div class="sidebar-brand">MicroBizMax</div>
        <ul class="sidebar-nav">
            <li><a href="/dashboard.html"><span class="nav-icon"></span><span>Dashboard</span></a></li>
            <li><a href="/products.html"><span class="nav-icon"></span><span>Products</span></a></li>
            <li><a href="/sales.html"><span class="nav-icon"></span><span>Sales</span></a></li>
            <li><a href="/customers.html" class="active"><span class="nav-icon"></span><span>Customers</span></a></li>
            <li><a href="/discounts.html"><span class="nav-icon"></span><span>Discounts</span></a></li>
            <li><a href="/profile.html"><span class="nav-icon"></span><span>Profile</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="#" id="logoutBtn"><span class="nav-icon"></span><span>Logout</span></a>
        </div>
    </nav>

    <main class="main-content">
        <div class="top-bar">
            <h1> Customers</h1>
            <div class="top-bar-right">
                <select class="lang-selector" id="langSelector">
                    <option value="en">English</option><option value="hi">हिन्दी</option><option value="pa">ਪੰਜਾਬੀ</option>
                </select>
                <button class="btn btn-primary" id="addCustomerBtn">+ Add Customer</button>
            </div>
        </div>

        <!-- Repeat Customers Highlight -->
        <div class="glass-card mb-24" id="repeatSection" style="display:none;">
            <div class="flex-between mb-16">
                <h3 style="font-size:1.1rem;"> Repeat Customers</h3>
                <span class="badge badge-green" id="repeatCount">0</span>
            </div>
            <div id="repeatList" style="display:flex;gap:12px;flex-wrap:wrap;"></div>
        </div>

        <div class="data-table-wrap">
            <table class="data-table" id="customersTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Orders</th>
                        <th>Total Spent (₹)</th>
                        <th>Loyalty</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="customersBody"></tbody>
            </table>
        </div>
        <div class="empty-state" id="emptyCustomers" style="display:none;">
            <div class="empty-icon"></div>
            <p>No customers yet. Add your first customer!</p>
        </div>
    </main>
</div>

<!-- Add/Edit Customer Modal -->
<div class="modal-overlay" id="customerModal">
    <div class="modal" style="position:relative;">
        <button class="modal-close" id="closeCustomerModal">&times;</button>
        <h2 id="customerModalTitle">Add Customer</h2>
        <form id="customerForm">
            <input type="hidden" id="editCustomerId">
            <div class="form-row">
                <div class="form-group">
                    <label>Name</label>
                    <input class="form-control" id="cName" placeholder="Customer name" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input class="form-control" id="cPhone" placeholder="Phone number" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Email</label>
                    <input class="form-control" id="cEmail" placeholder="Email (optional)">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input class="form-control" id="cAddress" placeholder="Address (optional)">
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">Save Customer</button>
        </form>
    </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/translations.js"></script>
<script src="/js/customers.js"></script>
<script src="/js/chatbot.js"></script>
</body>
</html>

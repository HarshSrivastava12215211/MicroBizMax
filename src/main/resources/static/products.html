<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products – MicroBizMax</title>
    <meta name="description" content="Manage your product inventory">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="page-bg"></div>
<div class="app-layout">

    <nav class="sidebar">
        <div class="sidebar-brand">MicroBizMax</div>
        <ul class="sidebar-nav">
            <li><a href="/dashboard.html"><span class="nav-icon"></span><span>Dashboard</span></a></li>
            <li><a href="/products.html" class="active"><span class="nav-icon"></span><span>Products</span></a></li>
            <li><a href="/sales.html"><span class="nav-icon"></span><span>Sales</span></a></li>
            <li><a href="/customers.html"><span class="nav-icon"></span><span>Customers</span></a></li>
            <li><a href="/discounts.html"><span class="nav-icon"></span><span>Discounts</span></a></li>
            <li><a href="/profile.html"><span class="nav-icon"></span><span>Profile</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="#" id="logoutBtn"><span class="nav-icon"></span><span>Logout</span></a>
        </div>
    </nav>

    <main class="main-content">
        <div class="top-bar">
            <h1> Products</h1>
            <div class="top-bar-right">
                <select class="lang-selector" id="langSelector">
                    <option value="en">English</option><option value="hi">हिन्दी</option><option value="pa">ਪੰਜਾਬੀ</option>
                </select>
                <button class="btn btn-primary" id="addProductBtn">+ Add Product</button>
            </div>
        </div>

        <div class="data-table-wrap">
            <table class="data-table" id="productsTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price (₹)</th>
                        <th>Cost (₹)</th>
                        <th>Stock</th>
                        <th>Unit</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productsBody">
                </tbody>
            </table>
        </div>
        <div class="empty-state" id="emptyProducts" style="display:none;">
            <div class="empty-icon"></div>
            <p>No products yet. Click "Add Product" to get started!</p>
        </div>
    </main>
</div>

<!-- Add/Edit Product Modal -->
<div class="modal-overlay" id="productModal">
    <div class="modal" style="position:relative;">
        <button class="modal-close" id="closeProductModal">&times;</button>
        <h2 id="productModalTitle">Add Product</h2>
        <form id="productForm">
            <input type="hidden" id="editProductId">
            <div class="form-row">
                <div class="form-group">
                    <label>Product Name</label>
                    <input class="form-control" id="pName" placeholder="e.g. Basmati Rice" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input class="form-control" id="pCategory" placeholder="e.g. Grocery">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Selling Price (₹)</label>
                    <input class="form-control" type="number" step="0.01" id="pPrice" placeholder="100" required>
                </div>
                <div class="form-group">
                    <label>Cost Price (₹)</label>
                    <input class="form-control" type="number" step="0.01" id="pCostPrice" placeholder="80">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Stock Quantity</label>
                    <input class="form-control" type="number" id="pStock" placeholder="50" required>
                </div>
                <div class="form-group">
                    <label>Unit</label>
                    <select class="form-control" id="pUnit">
                        <option value="piece">Piece</option>
                        <option value="kg">Kg</option>
                        <option value="litre">Litre</option>
                        <option value="pack">Pack</option>
                        <option value="dozen">Dozen</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <input class="form-control" id="pDesc" placeholder="Product description (optional)">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">Save Product</button>
        </form>
    </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/translations.js"></script>
<script src="/js/products.js"></script>
<script src="/js/chatbot.js"></script>
</body>
</html>
